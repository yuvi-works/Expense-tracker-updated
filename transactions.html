<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transactions - Ledger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%231A1A2E"/><text x="50" y="70" font-family="serif" font-size="65" font-weight="bold" fill="%23C9A84C" text-anchor="middle">L</text></svg>'><script>if(localStorage.getItem('ledger-theme')==='dark'){document.documentElement.setAttribute('data-theme', 'dark');}</script><link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="transactions.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header"><h2 class="logo">Ledger</h2></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i><span>Dashboard</span></a>
                <a href="add-expense.html" class="nav-item"><i class="ph ph-plus-circle"></i><span>Add Expense</span></a>
                <a href="transactions.html" class="nav-item active"><i class="ph ph-list-dashes"></i><span>Transactions</span></a>
                <a href="insights.html" class="nav-item"><i class="ph ph-chart-line-up"></i><span>Insights</span></a>
            </nav>
            <div class="sidebar-footer">
                <a href="settings.html" class="nav-item"><i class="ph ph-gear"></i><span>Settings</span></a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content page-transactions">
            <!-- Header for Darkmode Injection -->
            <header class="page-header" style="position:relative;">
                <h1>All Transactions</h1>
                <p>View and export your history</p>
            </header>

            <div class="transactions-actions">
                <!-- Personal / Household Toggle -->
                <div class="pill-toggle">
                    <button class="pill-btn active" id="btn-personal">Personal</button>
                    <button class="pill-btn" id="btn-household">Household</button>
                </div>
                
                <button class="btn-export" id="btn-export"><i class="ph ph-download-simple"></i> Export CSV</button>
            </div>

            <!-- Transactions Full Card -->
            <div class="card transactions-full-card">
                
                <!-- Zero State -->
                <div class="empty-state" id="empty-state" style="display: none;">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Piggy bank minimal icon -->
                        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                        <circle cx="12" cy="12" r="10" stroke="var(--border-color)"/>
                        <path d="M8 12h8m-4-4v8"/>
                    </svg>
                    <p>No expenses yet!</p>
                    <a href="add-expense.html" class="btn-primary-small">Add your first expense</a>
                </div>

                <!-- Table Content Wrapper -->
                <div class="table-responsive" id="table-container">
                    <table class="transactions-table full-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Category</th>
                                <th>Description</th>
                                <th class="user-col">Who</th>
                                <th class="amount-col">Amount</th>
                            </tr>
                        </thead>
                        <tbody id="tx-body">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

            </div>

            <!-- Global Data Summary -->
            <div class="table-footer-summary">
                <span>Total shown: <strong id="total-shown">€1,840.00</strong></span>
            </div>

        </main>
    </div>
    
    <!-- API & Auth Layer -->
    <script src="js/aws-config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

    <script src="navigation.js"></script>
    <script src="transactions.js"></script>
</body>
</html>
